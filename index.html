<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Social links profile</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

</head>
<body>
<div class="box">
  <img src="./assets/images/avatar-jessica.jpeg" alt="profile picture of Jessica Randall">
  <h2>Jessica Randall</h2>
  <p class="location">London, United Kingdom</p>
  <p class="bio">"Front-end developer and avid reader."</p>
  <div class="social-links">
    <a href="https://www.github.com" class="social-link" target="_blank" rel="noopener noreferrer">GitHub</a>
    <a href="https://www.frontendmentor.io" class="social-link" target="_blank" rel="noopener noreferrer">Frontend Mentor</a>
    <a href="https://www.linkedin.com" class="social-link" target="_blank" rel="noopener noreferrer">LinkedIn</a>
    <a href="https://www.twitter.com" class="social-link" target="_blank" rel="noopener noreferrer">Twitter</a>
    <a href="https://www.instagram.com" class="social-link" target="_blank" rel="noopener noreferrer">Instagram</a>
  </div>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Erdos Roland</a>.
  </footer>
</body>
</html>
